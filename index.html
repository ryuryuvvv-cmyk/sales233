</head>
<body>

<header class="header">
    <h1>🥤 v9</h1>
    <div class="status">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">待機中</span>
    </div>
    <button class="mic-btn" id="micBtn" onclick="toggleMic()">
        <span id="micIcon">🎤</span>
        <span id="micText">OFF</span>
    </button>
</header>

<div class="reconnect" id="reconnect">🔄 再接続</div>

<div class="undo-bar" id="undoBar">
    <span>クリアしました</span>
    <button class="undo-btn" onclick="undoClear()">↩ 戻す</button>
</div>

<div class="not-supported" id="notSupported">⚠️ Chrome推奨</div>

<div class="voice-box">
    <div class="voice-label">🎧 リアルタイム認識</div>
    <div class="voice-text empty" id="voiceText">マイクONで話してください</div>
</div>

<!-- タブエリア（目立つように黄色背景） -->

<div class="tabs-area">
    <div class="tabs-header">
        <span class="tabs-title">🔔 検出: <strong id="tabCount">0</strong>個</span>
        <div class="tabs-actions">
            <button class="tabs-action-btn" onclick="showHistory()">履歴</button>
            <button class="tabs-action-btn" onclick="clearTabs()">✕</button>
        </div>
    </div>
    <div id="tabsContainer" class="tabs-container">
        <span id="tabsEmpty" class="tabs-empty">ここにタブが出ます</span>
    </div>
</div>

<!-- デバッグ -->

<div class="debug" id="debug">[ DEBUG ]</div>

<div class="modal-overlay" id="historyModal" onclick="closeHistory(event)">
    <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-header">
            <span class="modal-title">📋 履歴</span>
            <button class="modal-close" onclick="closeHistory()">&times;</button>
        </div>
        <div class="modal-body" id="historyList"></div>
    </div>
</div>

<div class="content">
    <div class="card hidden" id="resultCard">
        <div class="card-header">
            <span class="card-type">切り返し</span>
            <span class="card-title" id="resultTitle"></span>
        </div>
        <div class="card-body" id="resultBody"></div>
    </div>
    <div class="card" id="defaultCard">
        <div class="default-msg">🎤 音声で自動検出</div>
    </div>
</div>

<div class="btns">
    <div class="btns-title">📌 手動選択</div>
    <div class="btns-grid" id="btnsGrid"></div>
</div>

<div class="log">
    <div class="log-header">
        <span class="log-title">📝 ログ</span>
        <div class="log-actions">
            <button class="log-btn" onclick="copyLog()">コピー</button>
            <button class="log-btn" onclick="downloadLog()">保存</button>
            <button class="log-btn" onclick="clearLog()">クリア</button>
        </div>
    </div>
    <div class="log-content" id="logContent"></div>
</div>

<script>
var DATA = [
    { id:1, title:"電気代が心配", kw:["電気","電気代","光熱費","コスト","維持費","ランニング","月々","料金"], body:"最新の省エネ機種は従来比40%削減。月3,000〜4,000円程度で、売上の5〜10%に収まります。" },
    { id:2, title:"場所がない", kw:["場所","スペース","狭い","置く","設置","入らない","邪魔","幅"], body:"スリムタイプは幅50cmから設置可能。看板や植栽を少し移動するだけで置けるケースも多いです。" },
    { id:3, title:"売れるか不安", kw:["売れ","売上","需要","利用者","買う人","儲か","収入","利益"], body:"オフィス立地で1日30〜50本、住宅街でも15〜30本が目安。売上の20%をお支払い。" },
    { id:4, title:"管理が面倒", kw:["管理","面倒","手間","補充","メンテ","故障","壊れ","誰が"], body:"商品補充、売上金回収、清掃、故障対応まで全て弊社が行います。" },
    { id:5, title:"契約期間が長い", kw:["契約","期間","何年","縛り","解約","年数","長い"], body:"基本3年契約ですが、閉店・移転等の場合は違約金なしで解約できる条項もあります。" },
    { id:6, title:"他社と契約中", kw:["他社","別の会社","契約中","既に","今の","入ってる"], body:"現在の条件を教えていただければ、比較資料をお出しします。" },
    { id:7, title:"防犯が心配", kw:["防犯","いたずら","壊され","治安","セキュリティ","荒らさ","盗ま"], body:"防犯カメラ内蔵タイプもあり、頑丈な筐体で簡単には壊れません。" },
    { id:8, title:"見た目が気になる", kw:["見た目","デザイン","景観","雰囲気","ダサ","おしゃれ","外観"], body:"木目調やマット仕上げなど選べます。店舗ロゴのラッピングも可能。" },
    { id:9, title:"今は必要ない", kw:["必要ない","いらない","今は","間に合","結構","大丈夫","不要"], body:"設置費・維持費ゼロで副収入が得られます。" },
    { id:10, title:"時間がない", kw:["時間","忙し","また今度","後で","今日は","急いで"], body:"資料だけお渡しします。3分でわかる概要と収益シミュレーション付き。" }
];

var activeTabs = [];
var historyList = [];
var lastCleared = [];
var logList = [];
var recognition = null;
var isListening = false;
var undoTimer = null;

var TAB_LIMIT = 5;
var HISTORY_LIMIT = 10;
var LOG_LIMIT = 30;

function debug(msg) {
    var el = document.getElementById('debug');
    var time = new Date().toLocaleTimeString('ja-JP');
    el.textContent = '[' + time + '] ' + msg + '\n' + el.textContent;
}

function init() {
    debug('init');
    
    var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { 
        document.getElementById('notSupported').classList.add('show'); 
        return; 
    }
    
    recognition = new SR();
    recognition.lang = 'ja-JP';
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.onresult = onResult;
    recognition.onerror = function(e) { debug('error: ' + e.error); };
    recognition.onend = function() {
        if (isListening) {
            document.getElementById('reconnect').classList.add('show');
            setTimeout(function() { document.getElementById('reconnect').classList.remove('show'); }, 1500);
            recognition.start();
        }
    };
    
    // ボタン生成
    var grid = document.getElementById('btnsGrid');
    for (var i = 0; i < DATA.length; i++) {
        (function(d) {
            var btn = document.createElement('button');
            btn.className = 'btn';
            btn.textContent = d.title;
            btn.onclick = function() { 
                addTabDirect(d); 
            };
            grid.appendChild(btn);
        })(DATA[i]);
    }
    
    debug('init完了');
}

function toggleMic() {
    if (isListening) {
        recognition.stop();
        isListening = false;
        document.getElementById('micBtn').classList.remove('on');
        document.getElementById('micIcon').textContent = '🎤';
        document.getElementById('micText').textContent = 'OFF';
        document.getElementById('statusDot').classList.remove('active');
        document.getElementById('statusText').textContent = '待機中';
        debug('マイクOFF');
    } else {
        recognition.start();
        isListening = true;
        document.getElementById('micBtn').classList.add('on');
        document.getElementById('micIcon').textContent = '🔴';
        document.getElementById('micText').textContent = 'ON';
        document.getElementById('statusDot').classList.add('active');
        document.getElementById('statusText').textContent = '認識中';
        debug('マイクON');
    }
}

function onResult(e) {
    var txt = '';
    for (var i = e.resultIndex; i < e.results.length; i++) {
        txt += e.results[i][0].transcript;
    }
    if (!txt) return;
    
    // ハイライト
    var display = txt;
    for (var i = 0; i < DATA.length; i++) {
        for (var j = 0; j < DATA[i].kw.length; j++) {
            var kw = DATA[i].kw[j];
            if (txt.indexOf(kw) !== -1) {
                display = display.split(kw).join('<span class="match">' + kw + '</span>');
            }
        }
    }
    document.getElementById('voiceText').innerHTML = display;
    document.getElementById('voiceText').classList.remove('empty');
    
    // マッチ検出 - 全部チェックしてから追加
    var toAdd = [];
    var currentIds = [];
    for (var i = 0; i < activeTabs.length; i++) {
        currentIds.push(activeTabs[i].id);
    }
    
    for (var i = 0; i < DATA.length; i++) {
        var d = DATA[i];
        // 既にタブにある？
        var exists = false;
        for (var k = 0; k < currentIds.length; k++) {
            if (currentIds[k] === d.id) { exists = true; break; }
        }
        if (exists) continue;
        
        // キーワードマッチ？
        var matched = false;
        for (var j = 0; j < d.kw.length; j++) {
            if (txt.indexOf(d.kw[j]) !== -1) {
                matched = true;
                debug('MATCH: ' + d.kw[j] + ' → ' + d.title);
                break;
            }
        }
        if (matched) {
            toAdd.push(d);
        }
    }
    
    // まとめて追加
    if (toAdd.length > 0) {
        debug('ADD: ' + toAdd.length + '件');
        for (var i = 0; i < toAdd.length; i++) {
            addTabDirect(toAdd[i]);
        }
    }
}

function addTabDirect(d) {
    // 既存チェック
    for (var i = 0; i < activeTabs.length; i++) {
        if (activeTabs[i].id === d.id) {
            debug('既存: ' + d.title);
            showResult(d);
            renderTabsNow();
            return;
        }
    }
    
    // 上限
    if (activeTabs.length >= TAB_LIMIT) {
        activeTabs.shift();
    }
    
    // 追加
    var time = new Date().toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'});
    activeTabs.push({ id: d.id, title: d.title, time: time });
    debug('タブ追加: ' + d.title + ' 合計:' + activeTabs.length);
    
    // 履歴
    historyList.unshift({ id: d.id, title: d.title, time: time });
    if (historyList.length > HISTORY_LIMIT) historyList.pop();
    
    // 表示
    showResult(d);
    renderTabsNow();
}

function renderTabsNow() {
    var container = document.getElementById('tabsContainer');
    var countEl = document.getElementById('tabCount');
    
    debug('renderTabs: ' + activeTabs.length + '個');
    
    // カウント更新
    countEl.textContent = activeTabs.length;
    
    // コンテナをクリア
    while (container.firstChild) {
        container.removeChild(container.firstChild);
    }
    
    if (activeTabs.length === 0) {
        var empty = document.createElement('span');
        empty.className = 'tabs-empty';
        empty.textContent = 'ここにタブが出ます';
        container.appendChild(empty);
        debug('空表示');
        return;
    }
    
    // タブを1つずつ追加
    for (var i = 0; i < activeTabs.length; i++) {
        (function(t, index) {
            var tab = document.createElement('div');
            tab.className = 'tab';
            tab.textContent = t.title;
            tab.onclick = function() {
                selectTabById(t.id);
            };
            container.appendChild(tab);
            debug('DOM追加: ' + t.title);
        })(activeTabs[i], i);
    }
    
    debug('render完了 children:' + container.children.length);
}

function selectTabById(id) {
    for (var i = 0; i < DATA.length; i++) {
        if (DATA[i].id === id) {
            showResult(DATA[i]);
            break;
        }
    }
}

function clearTabs() {
    if (activeTabs.length === 0) return;
    lastCleared = activeTabs.slice();
    activeTabs = [];
    renderTabsNow();
    
    document.getElementById('undoBar').classList.add('show');
    if (undoTimer) clearTimeout(undoTimer);
    undoTimer = setTimeout(function() {
        document.getElementById('undoBar').classList.remove('show');
        lastCleared = [];
    }, 3000);
}

function undoClear() {
    if (lastCleared.length === 0) return;
    activeTabs = lastCleared.slice();
    lastCleared = [];
    renderTabsNow();
    document.getElementById('undoBar').classList.remove('show');
}

function showHistory() {
    var list = document.getElementById('historyList');
    if (historyList.length === 0) {
        list.innerHTML = '<div class="history-empty">履歴なし</div>';
    } else {
        var html = '';
        for (var i = 0; i < historyList.length; i++) {
            var h = historyList[i];
            html += '<div class="history-item" onclick="restoreHistory(' + h.id + ')">';
            html += '<span class="history-name">' + h.title + '</span>';
            html += '<span class="history-time">' + h.time + '</span></div>';
        }
        list.innerHTML = html;
    }
    document.getElementById('historyModal').classList.add('show');
}

function closeHistory(e) {
    if (!e || e.target.id === 'historyModal') {
        document.getElementById('historyModal').classList.remove('show');
    }
}

function restoreHistory(id) {
    for (var i = 0; i < DATA.length; i++) {
        if (DATA[i].id === id) {
            addTabDirect(DATA[i]);
            break;
        }
    }
    closeHistory();
}

function showResult(d) {
    document.getElementById('defaultCard').classList.add('hidden');
    document.getElementById('resultCard').classList.remove('hidden');
    document.getElementById('resultTitle').textContent = d.title;
    document.getElementById('resultBody').textContent = d.body;
}

function addLog(txt, kws) {
    var time = new Date().toLocaleTimeString('ja-JP');
    logList.push({ time: time, txt: txt, kws: kws });
    if (logList.length > LOG_LIMIT) logList.shift();
    var el = document.getElementById('logContent');
    var html = '';
    for (var i = 0; i < logList.length; i++) {
        var e = logList[i];
        var m = e.kws && e.kws.length > 0 ? ' <span class="log-match">【' + e.kws.join('、') + '】</span>' : '';
        html += '<div class="log-entry"><span class="log-time">' + e.time + '</span> ' + e.txt + m + '</div>';
    }
    el.innerHTML = html;
}

function copyLog() {
    var txt = '';
    for (var i = 0; i < logList.length; i++) {
        var e = logList[i];
        txt += e.time + ' ' + e.txt + '\n';
    }
    navigator.clipboard.writeText(txt).then(function() { alert('コピー'); });
}

function downloadLog() {
    var txt = '';
    for (var i = 0; i < logList.length; i++) {
        txt += logList[i].time + ' ' + logList[i].txt + '\n';
    }
    var a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([txt], {type:'text/plain'}));
    a.download = 'log.txt';
    a.click();
}

function clearLog() {
    logList = [];
    document.getElementById('logContent').innerHTML = '';
}

init();
</script>

</body>
</html>
