        <div class="card-header">

    <div class="card" id="defaultCard">
        <div class="default-msg">

<script>
var DATA = [
    { id:1, title:"電気代が心配", kw:["電気","電気代","光熱費","コスト","維持費","ランニング","月々","料金"], body:"最新の省エネ機種は従来比40%削減。月3,000〜4,000円程度で、売上の5〜10%に収まります。LED照明やヒートポンプで夏冬も抑えられます。" },

    { id:3, title:"売れるか不安", kw:["売れ","売上","需要","利用者","買う人","儲か","収入","利益"], body:"オフィス立地で1日30〜50本、住宅街でも15〜30本が目安。売上の20%をお支払い。月3万円売上なら月6,000円の収入。初期費用ゼロです。" },

    { id:5, title:"契約期間が長い", kw:["契約","期間","何年","縛り","解約","年数","長い"], body:"基本3年契約ですが、閉店・移転等の場合は違約金なしで解約できる条項もあります。まずお試しください。" },
    { id:6, title:"他社と契約中", kw:["他社","別の会社","契約中","既に","今の","入ってる"], body:"現在の条件を教えていただければ、比較資料をお出しします。契約更新時に切り替えるお客様も多いですよ。" },
    { id:7, title:"防犯が心配", kw:["防犯","いたずら","壊され","治安","セキュリティ","荒らさ","盗ま"], body:"防犯カメラ内蔵タイプもあり、頑丈な筐体で簡単には壊れません。万が一の被害も弊社保険で対応します。" },
    { id:8, title:"見た目が気になる", kw:["見た目","デザイン","景観","雰囲気","ダサ","おしゃれ","外観"], body:"木目調やマット仕上げなど選べます。店舗ロゴのラッピングも可能。設置場所に合わせてご提案します。" },
    { id:9, title:"今は必要ない", kw:["必要ない","いらない","今は","間に合","結構","大丈夫","不要"], body:"設置費・維持費ゼロで副収入が得られます。検討されることがあればいつでもご連絡ください。" },
    { id:10, title:"時間がない", kw:["時間","忙し","また今度","後で","今日は","急いで"], body:"資料だけお渡しします。3分でわかる概要と収益シミュレーション付き。ご興味あればお電話ください。" }
];

var activeTabs = [];
var historyList = [];
var lastCleared = [];
var logList = [];
var recognition = null;
var isListening = false;
var undoTimer = null;

var TAB_LIMIT = 5;
var HISTORY_LIMIT = 10;
var LOG_LIMIT = 30;

function init() {
    var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { 
        document.getElementById('notSupported').classList.add('show'); 
        return; 
    }
    
    recognition = new SR();
    recognition.lang = 'ja-JP';
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.onresult = onResult;
    recognition.onerror = function(e) { 
        if (e.error === 'not-allowed') alert('マイクの使用を許可してください'); 
    };
    recognition.onend = function() {
        if (isListening) {
            document.getElementById('reconnect').classList.add('show');
            setTimeout(function() { document.getElementById('reconnect').classList.remove('show'); }, 1500);
            recognition.start();
        }
    };
    
    var grid = document.getElementById('btnsGrid');
    for (var i = 0; i < DATA.length; i++) {
        (function(d) {
            var btn = document.createElement('button');
            btn.className = 'btn';
            btn.textContent = d.title;
            btn.onclick = function() { addTabDirect(d); };
            grid.appendChild(btn);
        })(DATA[i]);
    }
}

function toggleMic() {
    if (isListening) {
        recognition.stop();
        isListening = false;
        document.getElementById('micBtn').classList.remove('on');
        document.getElementById('micIcon').textContent = '🎤';
        document.getElementById('micText').textContent = 'OFF';
        document.getElementById('statusDot').classList.remove('active');
        document.getElementById('statusText').textContent = '待機中';
    } else {
        recognition.start();
        isListening = true;
        document.getElementById('micBtn').classList.add('on');
        document.getElementById('micIcon').textContent = '🔴';
        document.getElementById('micText').textContent = 'ON';
        document.getElementById('statusDot').classList.add('active');
        document.getElementById('statusText').textContent = '認識中';
    }
}

function onResult(e) {
    var txt = '';
    var isFinal = false;
    for (var i = e.resultIndex; i < e.results.length; i++) {
        txt += e.results[i][0].transcript;
        if (e.results[i].isFinal) isFinal = true;
    }
    if (!txt) return;
    
    var display = txt;
    var matchedKws = [];
    for (var i = 0; i < DATA.length; i++) {
        for (var j = 0; j < DATA[i].kw.length; j++) {
            var kw = DATA[i].kw[j];
            if (txt.indexOf(kw) !== -1) {
                display = display.split(kw).join('<span class="match">' + kw + '</span>');
                if (matchedKws.indexOf(kw) === -1) matchedKws.push(kw);
            }
        }
    }
    document.getElementById('voiceText').innerHTML = display;
    document.getElementById('voiceText').classList.remove('empty');
    
    var toAdd = [];
    var currentIds = [];
    for (var i = 0; i < activeTabs.length; i++) {
        currentIds.push(activeTabs[i].id);
    }
    
    for (var i = 0; i < DATA.length; i++) {
        var d = DATA[i];
        var exists = false;
        for (var k = 0; k < currentIds.length; k++) {
            if (currentIds[k] === d.id) { exists = true; break; }
        }
        if (exists) continue;
        
        var matched = false;
        for (var j = 0; j < d.kw.length; j++) {
            if (txt.indexOf(d.kw[j]) !== -1) {
                matched = true;
                break;
            }
        }
        if (matched) toAdd.push(d);
    }
    
    if (toAdd.length > 0) {
        for (var i = 0; i < toAdd.length; i++) {
            addTabDirect(toAdd[i]);
        }
    }
    
    if (isFinal && txt.trim()) {
        addLog(txt, matchedKws);
    }
}

function addTabDirect(d) {
    for (var i = 0; i < activeTabs.length; i++) {
        if (activeTabs[i].id === d.id) {
            showResult(d);
            renderTabsNow(d.id);
            return;
        }
    }
    
    if (activeTabs.length >= TAB_LIMIT) {
        activeTabs.shift();
    }
    
    var time = new Date().toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'});
    activeTabs.push({ id: d.id, title: d.title, time: time });
    
    historyList.unshift({ id: d.id, title: d.title, time: time });
    if (historyList.length > HISTORY_LIMIT) historyList.pop();
    
    showResult(d);
    renderTabsNow(d.id);
}

function renderTabsNow(activeId) {
    var container = document.getElementById('tabsContainer');
    document.getElementById('tabCount').textContent = activeTabs.length;
    
    while (container.firstChild) {
        container.removeChild(container.firstChild);
    }
    
    if (activeTabs.length === 0) {
        var empty = document.createElement('span');
        empty.className = 'tabs-empty';
        empty.textContent = 'キーワードを検出すると表示されます';
        container.appendChild(empty);
        return;
    }
    
    for (var i = 0; i < activeTabs.length; i++) {
        (function(t) {
            var tab = document.createElement('div');
            tab.className = t.id === activeId ? 'tab active' : 'tab';
            tab.textContent = t.title;
            tab.onclick = function() { selectTabById(t.id); };
            container.appendChild(tab);
        })(activeTabs[i]);
    }
}

function selectTabById(id) {
    for (var i = 0; i < DATA.length; i++) {
        if (DATA[i].id === id) {
            showResult(DATA[i]);
            renderTabsNow(id);
            break;
        }
    }
}

function clearTabs() {
    if (activeTabs.length === 0) return;
    lastCleared = activeTabs.slice();
    activeTabs = [];
    renderTabsNow(null);
    
    document.getElementById('undoBar').classList.add('show');
    if (undoTimer) clearTimeout(undoTimer);
    undoTimer = setTimeout(function() {
        document.getElementById('undoBar').classList.remove('show');
        lastCleared = [];
    }, 3000);
}

function undoClear() {
    if (lastCleared.length === 0) return;
    activeTabs = lastCleared.slice();
    lastCleared = [];
    renderTabsNow(activeTabs[activeTabs.length - 1].id);
    document.getElementById('undoBar').classList.remove('show');
}

function showHistory() {
    var list = document.getElementById('historyList');
    if (historyList.length === 0) {
        list.innerHTML = '<div class="history-empty">履歴がありません</div>';
    } else {
        var html = '';
        for (var i = 0; i < historyList.length; i++) {
            var h = historyList[i];
            html += '<div class="history-item" onclick="restoreHistory(' + h.id + ')">';
            html += '<span class="history-name">' + h.title + '</span>';
            html += '<span class="history-time">' + h.time + '</span></div>';
        }
        list.innerHTML = html;
    }
    document.getElementById('historyModal').classList.add('show');
}

function closeHistory(e) {
    if (!e || e.target.id === 'historyModal') {
        document.getElementById('historyModal').classList.remove('show');
    }
}

function restoreHistory(id) {
    for (var i = 0; i < DATA.length; i++) {
        if (DATA[i].id === id) {
            addTabDirect(DATA[i]);
            break;
        }
    }
    closeHistory();
}

function showResult(d) {
    document.getElementById('defaultCard').classList.add('hidden');
    document.getElementById('resultCard').classList.remove('hidden');
    document.getElementById('resultTitle').textContent = d.title;
    document.getElementById('resultBody').textContent = d.body;
    
    var btns = document.querySelectorAll('.btn');
    for (var i = 0; i < btns.length; i++) {
        if (btns[i].textContent === d.title) {
            btns[i].classList.add('active');
        } else {
            btns[i].classList.remove('active');
        }
    }
}

function addLog(txt, kws) {
    var time = new Date().toLocaleTimeString('ja-JP');
    logList.push({ time: time, txt: txt, kws: kws });
    if (logList.length > LOG_LIMIT) logList.shift();
    renderLog();
}

function renderLog() {
    var el = document.getElementById('logContent');
    var html = '';
    for (var i = 0; i < logList.length; i++) {
        var e = logList[i];
        var m = e.kws && e.kws.length > 0 ? ' <span class="log-match">【' + e.kws.join('、') + '】</span>' : '';
        html += '<div class="log-entry"><span class="log-time">' + e.time + '</span> ' + e.txt + m + '</div>';
    }
    el.innerHTML = html;
    el.parentElement.scrollTop = el.parentElement.scrollHeight;
}

function copyLog() {
    var txt = '';
    for (var i = 0; i < logList.length; i++) {
        var e = logList[i];
        var m = e.kws && e.kws.length > 0 ? ' 【' + e.kws.join('、') + '】' : '';
        txt += e.time + ' ' + e.txt + m + '\n';
    }
    navigator.clipboard.writeText(txt).then(function() { alert('コピーしました'); });
}

function downloadLog() {
    var txt = '';
    for (var i = 0; i < logList.length; i++) {
        var e = logList[i];
        var m = e.kws && e.kws.length > 0 ? ' 【' + e.kws.join('、') + '】' : '';
        txt += e.time + ' ' + e.txt + m + '\n';
    }
    var a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([txt], {type:'text/plain'}));
    a.download = 'transcript_' + new Date().toISOString().slice(0,10) + '.txt';
    a.click();
}

function toggleVoice() {
    document.getElementById('voicePanel').classList.toggle('open');
}

function toggleLog() {
    document.getElementById('logPanel').classList.toggle('open');
}

function clearLog() {
    if (confirm('ログをクリアしますか？')) {
        logList = [];
        renderLog();
    }
}

init();
</script>

</body>
</html>
